<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pseudo Classes no CSS</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Demonstração de Pseudo Classes</h1>
    </header>

    <main>
      <h2>:hover - Ativada quando o mouse passa sob o elemento:</h2>

      <div class="caixa">Passe o mouse aqui</div>

      <br />
      <h2>:active - clique no botão</h2>
      <button class="btn-download">Download</button>

      <br />

      <h2>:focus - Clique nos campos</h2>
      <form>
        <input type="text" placeholder="Clique aqui para focar">
        <input type="password" placeholder="Outro campo do focus">
      </form>
    </main>
  </body>
</html>
