<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outras midias no HTML 5</title>
</head>
<body>
    <header>
        <h1>Outras midias no HTML 5</h1>
    </header>
    <main>
        <section>
            <h2>Áudio</h2>
            <audio controls src="/aula-04-midias-e-formatacoes/DW1/midias/audio.mp3"> 2026 </audio>

            <h2> Vídeo </h2>
            <video controls src="/aula-04-midias-e-formatacoes/DW1/midias/video.mp4" type="video/mp4" width="400px"> Video não encontrado ou não suportado
                 </video>

            <h2> Video do youtube (externo) - iframe </h2>
            <iframe src="https:///www.youtube.com./embed/3g6WChxy
            title="Exemplo de video do youtube" 
            width="560px"
            height="315px"
            frameborder="0">
                </iframe>
                <!-- Incorporando Mapas -->
                 <h2> Mapas (Iframe) </h2>
                 <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d58104.23107145617!2d-47.85072864339396!3d-24.467626115876634!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94c53436f4f0c1cb%3A0xbab60b5cc9451e73!2sRegistro%2C%20SP%2C%2011900-000!5e0!3m2!1spt-BR!2sbr!4v1773203329518!5m2!1spt-BR!2sbr" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>

                 <!-- Incorporando PDFs -->
                  <h2>PDF (iframe)</h2>
                  <iframe src="/aula-04-midias-e-formatacoes/DW1/midias/documento.pdf"
                  frameborder="0"
                  title="Horários DSM-1"
                  width="600px"
                  height="450px"></iframe>

                  <!-- Incorporando Vetores -->
                   <h2>Vetores (ilustrações)</h2>
        </section>
    </main>
</body>
</html>
